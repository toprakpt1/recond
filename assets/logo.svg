<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 70" width="300" height="70">
  <defs>
    <filter id="shadow" x="-5%" y="-10%" width="115%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="70" rx="8" fill="#0a0a0a" filter="url(#shadow)"/>

  <!-- systemd-style status dot -->
  <circle cx="22" cy="35" r="4" fill="#00ff41"/>

  <!-- recon (light gray) -->
  <text x="38" y="40" font-family="'Fira Code', 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace" font-size="24" font-weight="700" fill="#e0e0e0">recon</text>

  <!-- d (bright green, daemon suffix) -->
  <text x="110" y="40" font-family="'Fira Code', 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace" font-size="24" font-weight="700" fill="#00ff41">d</text>

  <!-- Active (running) indicator -->
  <text x="136" y="40" font-family="'Fira Code', 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace" font-size="11" font-weight="400" fill="#555">active (running)</text>
</svg>
